name: Build and publish DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build the DMG
        run: bash build-dmg.sh

      - name: Publish, overwriting the release for this version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG=$(ls target/jp/out/*.dmg | head -1)
          NAME=$(basename "$DMG" .dmg)
          VER=${NAME#MacPad++-}
          TAG="v$VER"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "MacPad++ $VER" \
              --notes "Automated build of MacPad++ $VER."
          fi
